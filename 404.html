<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname || "";
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        var base = "/pulperia-inventory/";
        var normalizedPath = path.replace(base, "/");
        window.location.replace(base + "#" + normalizedPath + search + hash);
      })();
    </script>
  </head>
  <body></body>
</html>
